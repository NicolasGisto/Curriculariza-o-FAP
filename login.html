<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmar Conta</title>

<link rel="stylesheet" href="style.css">

<style>

.login-container{
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:rgba(0,0,0,0.85);

    width:400px;

    padding:40px;

    border-radius:8px;
}

.login-box h2{
    margin-bottom:30px;
}

.login-box input{
    width:100%;

    padding:15px;

    margin-bottom:15px;

    border:none;

    border-radius:5px;
}

.login-box button{
    width:100%;

    padding:15px;

    background:#E50914;

    color:white;

    border:none;

    cursor:pointer;

    font-size:18px;
}

</style>

</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h2>Confirme sua Conta</h2>

        <input
            type="email"
            placeholder="Email">

        <input
            type="password"
            placeholder="Senha">

        <button id="continuar">
            Continuar
        </button>

    </div>

</div>

<script>

document.getElementById("continuar")
.addEventListener("click", function(){

    window.location.href = "golpe.html";

});

</script>

</body>
</html>
